<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Neuquén WebAR - Demo Comedor Definitiva</title>
    
    <!-- Librerías estables de código abierto (A-Frame + AR.js) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden; background-color: #000;">

    <!-- Forzamos el uso de la webcam y el renderizado limpio del video texture -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; sourceWidth:1280; sourceHeight:960; displayWidth: 1280; displayHeight: 960; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <!-- Tu archivo de dinosaurio .glb -->
            <a-asset-item id="dinosaurio" src="dino.glb"></a-asset-item>
        </a-assets>

        <!-- Marcador HIRO para la prueba de laboratorio en tu comedor -->
        <!-- Cuando enfoques este marcador impreso o en otra pantalla, el dino se clavará ahí -->
        <a-marker preset="hiro">
            
            <!-- Posición 0 0 0 lo apoya directo en el papel (piso) -->
            <!-- scale="0.1 0.1 0.1" lo achica para que entre en tu sala -->
            <a-entity 
                gltf-model="#dinosaurio" 
                position="0 0 0" 
                scale="0.5 0.5 0.5"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Cámara estricta de AR.js -->
        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
