<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Diagnostico RA - Neuquén</title>
    <!-- Cargamos librerías estables y livianas desde servidores alternativos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- Inicialización forzada limpia para navegadores móviles modernos -->
    <a-scene embedded arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        
        <!-- Probamos con el marcador básico para verificar que el motor funciona -->
        <a-marker type="pattern" url="markers/pattern-marker.patt">
            
            <!-- Reemplazamos temporalmente los .GLB por un cubo nativo que no consume datos -->
            <a-box position="0 0.5 0" material="color: red;" scale="0.5 0.5 0.5"></a-box>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
