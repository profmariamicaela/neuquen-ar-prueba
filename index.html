<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuquén WebAR - Demo Comedor</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- Inicialización combinada: cámara + giroscopio -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="dinosaurio" src="dino.glb"></a-asset-item>
        </a-assets>

        <!-- REEMPLAZÁ ACÁ CON LAS COORDENADAS DE TU COMEDOR -->
        <a-entity gps-entity-place="latitude: -34.644974; longitude: -58.472789;">
            
            <!-- Posicionamos al dino 4 metros adelante (-4 en el eje Z) -->
            <!-- scale="0.3 0.3 0.3" evita que sea gigante dentro de tu casa -->
            <a-entity 
                gltf-model="#dinosaurio" 
                position="0 0 -4" 
                scale="0.3 0.3 0.3"
                rotation="0 0 0">
            </a-entity>
            
        </a-entity>

        <a-entity camera gps-camera rotation-reader></a-entity>
        
    </a-scene>
</body>
</html>
