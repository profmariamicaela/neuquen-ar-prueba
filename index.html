<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piloto RA - Neuquén</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- Cargamos el marcador de Polycam (tu sillón) y el mono -->
            <a-asset-item id="sillon-ref" src="models/sillon.glb"></a-asset-item>
            <a-asset-item id="mono" src="models/mono.glb"></a-asset-item>
        </a-assets>

        <!-- Cuando la cámara detecte el marcador impreso -->
        <a-marker type="pattern" url="markers/pattern-marker.patt">
            
            <!-- IMPORTANTE: El sillón digital lo dejamos invisible (visible="false"). 
                 Solo nos sirve en el software para calcular la posición real. -->
            <a-entity gltf-model="#sillon-ref" position="0 0 0" scale="1 1 1" visible="false"></a-entity>
            
            <!-- EL MONO: Modificá 'position' para sentarlo en el sillón digital.
                 Ejemplo: position="X Y Z" (X: izquierda/derecha, Y: altura, Z: adelante/atrás) -->
            <a-entity gltf-model="#mono" position="0 0.3 -0.5" scale="1 1 1" rotation="0 0 0"></a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>
</body>
</html>
