<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neuquén WebAR - Demo Comedor Geolocalizado</title>
    <!-- 1. Cargamos A-Frame básico estable -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- 2. Cargamos el paquete específico de AR.js que SÍ contiene la lógica de GPS limpia -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- CORRECCIÓN 1: Forzamos a la escena a inicializar el componente de GPS en vez de buscar marcadores visuales -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="dinosaurio" src="dino.glb"></a-asset-item>
        </a-assets>

        <!-- Coordenadas asignadas de tu espacio -->
        <a-entity gps-entity-place="latitude: -34.644974; longitude: -58.472789;">
            
            <!-- CORRECCIÓN 2: En GPS-AR, position="0 0 0" significa "exactamente parado sobre la coordenada". 
                 Si le ponías -4 en Z, lo estabas desplazando en base al norte magnético, perdiendo el centro. -->
            <a-entity 
                gltf-model="#dinosaurio" 
                position="0 0 0" 
                scale="0.3 0.3 0.3"
                rotation="0 0 0">
            </a-entity>
            
        </a-entity>

        <!-- CORRECCIÓN 3: Agregamos parámetros de simulación en cero para obligar al teléfono a buscar los satélites reales -->
        <a-entity camera gps-camera="simulateLatitude: 0; simulateLongitude: 0;" rotation-reader></a-entity>
        
    </a-scene>
</body>
</html>
